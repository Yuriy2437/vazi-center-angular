<div class="question-section">
  <h2 class="question-section-title">{{ title }}</h2>

  <form (ngSubmit)="handleSubmit()" class="ask-question-form">
    <div class="input-container">
      <input
        type="text"
        placeholder="Name"
        [(ngModel)]="name"
        name="name"
        maxlength="25"
        class="name-input"
      />
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        maxlength="25"
        class="email-input"
      />
    </div>
    <textarea
      placeholder="Question"
      [(ngModel)]="question"
      name="question"
      maxlength="150"
      class="question-input"
    ></textarea>
    <button type="submit" class="send-button">Send</button>
  </form>

  <div class="questions-list">
    <h3>List of Questions</h3>
    <div class="questions-header">
      <span>Name</span>
      <span>Question</span>
      <span *ngIf="isAdmin">Action</span>
      <span *ngIf="isAdmin">Answer</span>
    </div>
    <div class="questions-content">
      <div *ngFor="let q of questions" class="question-item">
        <span>{{ q.name }}</span>
        <span class="question-text">{{ q.question }}</span>
        <span *ngIf="isAdmin">
          <button (click)="handleDelete(q._id)" class="delete-button">
            Delete
          </button>
        </span>
        <span *ngIf="isAdmin">
          <button (click)="handleAnswer(q.email)" class="answer-button">
            Answer
          </button>
        </span>
      </div>
    </div>
  </div>
</div>
